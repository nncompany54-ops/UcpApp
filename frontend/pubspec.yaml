name: ucp_app

description: تطبيق المؤسسة المتحدة (UCP) للهواتف المحمولة
publish_to: 'none' # This is a private package.

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  provider: ^6.1.1
  flutter_svg: ^2.0.10
  jwt_decode: ^0.3.1
  supabase_flutter: ^2.5.0
  carousel_slider: ^5.0.0
  url_launcher: ^6.2.5
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
